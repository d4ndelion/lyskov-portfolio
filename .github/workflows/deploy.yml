name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

# Minimal permissions required by the GitHub Pages deploy action.
permissions:
  contents: read
  pages:    write
  id-token: write

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Generate site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate and verify site
        run: ./gradlew :app:verifySite --no-daemon

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Must match the output directory configured in app/build.gradle.kts
          path: build/site

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
